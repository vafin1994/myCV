<section id="skills" class="sec wrap" data-screen-label="Skills" aria-labelledby="skills-title">
  <div class="sec__head">
    <span class="sec__num">02</span>
    <div>
      <span class="kicker">Skills</span>
      <h2 id="skills-title" class="sec__title">What I work with</h2>
    </div>
  </div>
  <div class="skills">
    @for (skill of resume.skills; track skill.name) {
      <div class="skill">
        <div class="skill__top">
          <span class="skill__name">{{ skill.name }}</span>
          <span class="skill__lvl">{{ skill.level }}</span>
        </div>
        <div class="tags">
          @for (keyword of skill.keywords; track keyword) {
            <span class="tag">{{ keyword }}</span>
          }
        </div>
      </div>
    }
  </div>
</section>
