<section class="hero wrap" data-screen-label="Header" aria-labelledby="hero-name">
  <div class="status anim">
    <span class="pulse" aria-hidden="true"><i></i></span>
    <span>Open to work — <b>{{ workTypeBadge }}</b></span>
  </div>
  <h1 id="hero-name" class="anim">{{ firstName }}<br>{{ lastName }}<em>.</em></h1>
  <div class="hero__role anim">
    <span>{{ resume.basics.label }}</span>
    <span class="sep">//</span>
    <span class="loc">{{ resume.basics.location.city }}, {{ resume.basics.location.countryCode }}</span>
  </div>
  <p class="lead anim">{{ resume.basics.summary }}</p>
  <div class="hero__cta anim">
    <a class="btn btn--primary" href="#contact">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="m4 6 8 6 8-6"/></svg>
      Get in touch
    </a>
    @if (linkedIn) {
      <a class="btn" [href]="linkedIn.url" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14zM8.34 17.34V10.4H6.03v6.94h2.31zM7.18 9.4a1.34 1.34 0 1 0 0-2.68 1.34 1.34 0 0 0 0 2.68zm10.16 7.94v-3.8c0-2.03-1.08-2.98-2.53-2.98-1.17 0-1.69.64-1.98 1.09v-.94h-2.3c.03.65 0 6.94 0 6.94h2.3v-3.88c0-.2.02-.41.08-.56.16-.41.54-.84 1.17-.84.83 0 1.16.63 1.16 1.55v3.73h2.43z"/></svg>
        LinkedIn
      </a>
    }
  </div>
</section>
